<svg width="1360" height="1720" viewBox="0 0 680 860" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff">
<style>
  text { font-family: 'Helvetica Neue', Arial, sans-serif; }
  .th { font-size: 14px; font-weight: 500; }
  .ts { font-size: 12px; font-weight: 400; }
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<text x="340" y="16" text-anchor="middle" font-size="11" fill="#888780" font-family="Helvetica Neue, Arial, sans-serif">veronica-core v3.7.1 — ShieldPipeline evaluation flow</text>

<!-- Start -->
<rect x="240" y="20" width="200" height="40" rx="20" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="340" y="40" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">LLM / Tool call request</text>
<line x1="340" y1="60" x2="340" y2="90" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Step 1: SafeMode -->
<rect x="210" y="90" width="260" height="50" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text class="th" x="340" y="108" text-anchor="middle" dominant-baseline="central" fill="#791F1F">SafeMode enabled?</text>
<text class="ts" x="340" y="126" text-anchor="middle" dominant-baseline="central" fill="#A32D2D">Emergency kill-switch (F5)</text>
<text class="ts" x="530" y="115" text-anchor="start" fill="#A32D2D">Yes → HALT all</text>
<line x1="470" y1="115" x2="524" y2="115" stroke="#A32D2D" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="140" x2="340" y2="168" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="350" y="160" text-anchor="start" fill="#5F5E5A">No</text>

<!-- Step 2: CircuitBreaker -->
<rect x="210" y="168" width="260" height="50" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="th" x="340" y="186" text-anchor="middle" dominant-baseline="central" fill="#412402">Circuit breaker OPEN?</text>
<text class="ts" x="340" y="204" text-anchor="middle" dominant-baseline="central" fill="#854F0B">Per-entity failure counting</text>
<text class="ts" x="530" y="193" text-anchor="start" fill="#854F0B">Yes → HALT</text>
<line x1="470" y1="193" x2="524" y2="193" stroke="#854F0B" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="218" x2="340" y2="246" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="350" y="238" text-anchor="start" fill="#5F5E5A">No</text>

<!-- Step 3: Budget -->
<rect x="210" y="246" width="260" height="50" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="th" x="340" y="264" text-anchor="middle" dominant-baseline="central" fill="#412402">Budget ceiling exceeded?</text>
<text class="ts" x="340" y="282" text-anchor="middle" dominant-baseline="central" fill="#854F0B">max_cost_usd hard cap</text>
<text class="ts" x="530" y="271" text-anchor="start" fill="#854F0B">Yes → HALT</text>
<line x1="470" y1="271" x2="524" y2="271" stroke="#854F0B" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="296" x2="340" y2="324" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="350" y="316" text-anchor="start" fill="#5F5E5A">No</text>

<!-- Step 4: Step limit -->
<rect x="210" y="324" width="260" height="50" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="th" x="340" y="342" text-anchor="middle" dominant-baseline="central" fill="#412402">Step limit reached?</text>
<text class="ts" x="340" y="360" text-anchor="middle" dominant-baseline="central" fill="#854F0B">max_steps bounded recursion</text>
<text class="ts" x="530" y="349" text-anchor="start" fill="#854F0B">Yes → HALT</text>
<line x1="470" y1="349" x2="524" y2="349" stroke="#854F0B" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="374" x2="340" y2="402" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="350" y="394" text-anchor="start" fill="#5F5E5A">No</text>

<!-- Step 5: Token / window budget -->
<rect x="210" y="402" width="260" height="50" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="340" y="420" text-anchor="middle" dominant-baseline="central" fill="#085041">Token / window budget?</text>
<text class="ts" x="340" y="438" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">DEGRADE zone + HALT ceiling</text>
<text class="ts" x="530" y="420" text-anchor="start" fill="#0F6E56">Over → DEGRADE</text>
<text class="ts" x="530" y="437" text-anchor="start" fill="#0F6E56">Exhausted → HALT</text>
<line x1="470" y1="427" x2="524" y2="427" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="452" x2="340" y2="478" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Step 6: Semantic loop -->
<rect x="210" y="478" width="260" height="50" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="340" y="496" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Semantic loop detected?</text>
<text class="ts" x="340" y="514" text-anchor="middle" dominant-baseline="central" fill="#534AB7">Jaccard similarity > threshold</text>
<text class="ts" x="530" y="496" text-anchor="start" fill="#534AB7">Yes → HALT</text>
<line x1="470" y1="496" x2="524" y2="496" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="528" x2="340" y2="556" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Step 7: Memory governance -->
<rect x="210" y="556" width="260" height="50" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="340" y="574" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Memory governance?</text>
<text class="ts" x="340" y="592" text-anchor="middle" dominant-baseline="central" fill="#534AB7">ALLOW / DENY / QUARANTINE</text>
<text class="ts" x="530" y="574" text-anchor="start" fill="#534AB7">Deny → HALT</text>
<line x1="470" y1="574" x2="524" y2="574" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="606" x2="340" y2="634" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Step 8: Degradation ladder -->
<rect x="210" y="634" width="260" height="50" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="340" y="652" text-anchor="middle" dominant-baseline="central" fill="#712B13">Degradation tier?</text>
<text class="ts" x="340" y="670" text-anchor="middle" dominant-baseline="central" fill="#993C1D">model → trim → rate_limit</text>
<text class="ts" x="530" y="652" text-anchor="start" fill="#993C1D">Tier hit → DEGRADE</text>
<line x1="470" y1="652" x2="524" y2="652" stroke="#993C1D" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="684" x2="340" y2="714" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Execute -->
<rect x="220" y="714" width="240" height="44" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text class="th" x="340" y="730" text-anchor="middle" dominant-baseline="central" fill="#27500A">ALLOW → Execute fn()</text>
<text class="ts" x="340" y="746" text-anchor="middle" dominant-baseline="central" fill="#3B6D11">Record cost + emit SafetyEvent</text>

<line x1="340" y1="758" x2="340" y2="786" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Post-call: on_error -->
<rect x="210" y="786" width="260" height="50" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="th" x="340" y="804" text-anchor="middle" dominant-baseline="central" fill="#412402">Error raised? (on_error)</text>
<text class="ts" x="340" y="822" text-anchor="middle" dominant-baseline="central" fill="#854F0B">Retry hook → ALLOW retry or HALT</text>
<text class="ts" x="530" y="804" text-anchor="start" fill="#854F0B">Default: fail-closed HALT</text>
<line x1="470" y1="804" x2="524" y2="804" stroke="#854F0B" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>