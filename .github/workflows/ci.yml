name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  release-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Release quality gate
        run: python tools/release_check.py --mode=pr

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest --cov=veronica_core --cov-report=xml --cov-report=term-missing --cov-fail-under=90 -v

  test-nogil:
    needs: [test]
    runs-on: ubuntu-latest
    # Smoke test only -- timing-sensitive tests may fail without GIL.
    # Track results without blocking the pipeline.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up free-threaded Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13t"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # cffi does not support free-threaded CPython 3.13 (fixed in 3.14+).
          # Skip cryptography/hvac (which depend on cffi) and install remaining
          # test dependencies individually.
          pip install pytest pytest-cov pytest-timeout fakeredis lupa pyyaml redis \
            opentelemetry-api opentelemetry-sdk
          pip install -e .

      - name: Verify free-threaded build
        run: |
          python -c "import sys; gil = sys._is_gil_enabled(); print(f'GIL enabled: {gil}'); assert not gil, f'Expected GIL disabled (3.13t build), but _is_gil_enabled()={gil}. Check that setup-python provisioned 3.13t, not 3.13.'"

      - name: Run tests (nogil smoke -- no coverage threshold)
        env:
          # PYTHON_GIL=0 is redundant with 3.13t but documents intent explicitly
          PYTHON_GIL: "0"
        run: |
          pytest -v --timeout=120
